x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  blockscout-redis-db:
    image: redis:alpine
    container_name: blockscout-redis-db
    command: redis-server
    restart: unless-stopped
    volumes:
      - blockscout-redis-data:/data
    <<: *logging

  blockscout-db-init:
    image: postgres:17
    container_name: blockscout-db-init
    volumes:
      - blockscout-db-data:/var/lib/postgresql/data
    entrypoint:
      - sh
      - -c
      - |
        chown -R 2000:2000 /var/lib/postgresql/data
    <<: *logging

  blockscout-db:
    image: postgres:17
    user: 2000:2000
    shm_size: 256m
    restart: unless-stopped
    container_name: blockscout-db
    command: postgres -c 'max_connections=200' -c 'client_connection_check_interval=60000'
    depends_on:
      blockscout-db-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: blockscout
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: ceWb1MeLBEeOIfk65gU8EjF8
    ports:
      - "7432:5432"
    volumes:
      - blockscout-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    <<: *logging

  blockscout-backend:
    image: ghcr.io/blockscout/blockscout-optimism:latest
    pull_policy: always
    restart: unless-stopped
    container_name: blockscout-backend
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    depends_on:
      blockscout-db:
        condition: service_healthy
      blockscout-redis-db:
        condition: service_started
    ports:
      - "4000:4000"
    env_file:
      - ./blockscout/envs/common-blockscout.env
    volumes:
      - blockscout-logs:/app/logs/
      - blockscout-dets:/app/dets/
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    <<: *logging

volumes:
  blockscout-redis-data:
  blockscout-db-data:
  blockscout-logs:
  blockscout-dets:
